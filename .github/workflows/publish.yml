name: Publish

# Build sdist+wheel and upload to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC): no API token or stored secret.
#
# One-time PyPI setup (the project does not exist yet, so add a "pending
# publisher"): PyPI -> Your projects / Publishing -> add a pending publisher:
#     PyPI project name: pytest-flakedoctor
#     Owner:             Therealdk8890
#     Repository:        pytest-flakedoctor
#     Workflow name:     publish.yml
#     Environment:       pypi
# (Adjust Owner/Repository if you host the repo under a different name.)

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify the release tag matches the package version
        run: |
          python -m pip install --upgrade packaging
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          echo "package version: $version | release tag: $tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match pyproject version '$version' — bump the version or fix the tag before publishing"
            exit 1
          fi
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
